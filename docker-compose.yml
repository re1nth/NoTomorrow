services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: notomorrow
      POSTGRES_PASSWORD: notomorrow
      POSTGRES_DB: notomorrow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notomorrow']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
