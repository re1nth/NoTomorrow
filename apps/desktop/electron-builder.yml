# electron-builder config for NoTomorrow desktop.
#
# Distribution model: self-contained. build/stage-web.mjs runs
# `pnpm deploy` into build/web-staging/, ships that as an extraResource,
# and paths.ts prefers it at runtime — so the packaged .app runs on any
# arm64 Mac without needing the source repo on disk.
#
# Ad-hoc code signed (identity: '-') so macOS Gatekeeper reports a
# friendly "unknown developer" prompt instead of "app is damaged" on
# first launch. Without a paid Apple Developer ID we can't notarize, so
# users still need to right-click → Open the first time (or run
# `xattr -dr com.apple.quarantine /Applications/NoTomorrow.app`).

appId: com.notomorrow.app
productName: NoTomorrow
copyright: NoTomorrow
asar: true

directories:
  output: dist-electron
  buildResources: build

files:
  - dist/**/*
  - package.json

# Native modules must be unpacked from asar so dlopen can find their .node
# binaries on disk.
asarUnpack:
  - "**/better-sqlite3/**"
  - "**/bindings/**"

# Ship the SQLite migrations next to the binary so the launcher's runtime
# resolves them via `process.resourcesPath/db-sqlite-migrations` instead of
# walking the repo. Everything else (web app source, packages, prompts) is
# read from the repo path resolved at runtime.
extraResources:
  - from: ../../packages/db-sqlite/migrations
    to: db-sqlite-migrations
  # Self-contained web tree staged by build/stage-web.mjs — production
  # .next/, public/, and hoisted node_modules. paths.ts loads from here.
  - from: build/web-staging
    to: web
  # Repo path baked at build time. Still emitted so `pnpm dev` from a
  # moved checkout works; runtime prefers the bundled `web` above.
  - from: build/repo-config.json
    to: repo-config.json

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.productivity
  icon: build/icon.icns
  identity: '-'               # ad-hoc signed (no paid Developer ID)
  hardenedRuntime: false
  gatekeeperAssess: false
  type: distribution

dmg:
  title: NoTomorrow
  icon: build/icon.icns
  iconSize: 96
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

publish: null
